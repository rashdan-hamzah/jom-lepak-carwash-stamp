<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JLCW Loyalty Point</title>
    <meta
      name="description"
      content="JLCW digital stamp loyalty for carwash customers."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script>
      window.CARWASH_CONFIG = {
        apiBaseUrl: "https://carwashstamp.rewardfave.workers.dev",
      };
    </script>
    <script src="./app.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  </head>
  <body>
    <main class="page-shell customer-page">
      <section class="customer-stage" aria-label="Customer loyalty page">
        <div class="customer-intro">
          <div class="logo-placeholder">
  <img src="Logo.jpeg" alt="JLCW Logo" class="logo-image">
</div>
          <h1>Check JLCW points anda.</h1>
          
        </div>

      
            
            <div class="claim-panel glass-panel">
               <label class="field-label" for="phoneNumber">Phone no</label>
              <input
                id="phoneNumber"
                name="phoneNumber"
                type="tel"
                inputmode="tel"
                placeholder=""
              />
              <button class="cta-button" id="claimButton">View card</button>
              <div class="sync-status" id="syncStatus"></div>
            </div>

            <div class="card-stage" id="cardStage">
              <div
                class="flip-card"
                id="flipCard"
                role="button"
                tabindex="0"
                aria-live="polite"
                aria-label="Loyalty card. Tap to flip."
              >
                <div class="flip-card-inner">
                  <div class="flip-face flip-front">
                    <div class="card-top">
                      <div>
                        <div class="brand-name">JLCW</div>
                        <div class="card-subtitle">JLCW Card</div>
                      </div>
                      <div class="card-chip">[]</div>
                    </div>
                    <div class="card-owner" id="cardOwner"></div>
                    <div class="card-footer-row">
                      <div>
                        <div class="mini-label">Phone</div>
                        <div class="mini-value" id="cardCustomerId"></div>
                      </div>
                      <div class="stamps-count">
                        <div class="count-number" id="stampCount">0</div>
                        <div class="mini-label">points</div>
                      </div>
                    </div>
                  </div>
                  <div class="flip-face flip-back">
                    <div class="progress-header">
                      <div>
                        <div class="brand-name">JLCW</div>
                        <div class="card-subtitle">Premium Member</div>
                      </div>
                      <div class="close-pill">x</div>
                    </div>
                    <div class="progress-stats">
                      <div><strong id="collectedCount">0</strong><span>Collected</span></div>
                      <div><strong id="remainingCount">10</strong><span>Remaining</span></div>
                      <div><strong id="completeCount">0%</strong><span>Complete</span></div>
                    </div>
                    <div class="stamp-grid" id="stampGrid" aria-label="Stamp progress grid"></div>
                    
                    <button class="cta-button" id="redeemButton" type="button">Redeem reward</button>
                    
                  </div>
                </div>
              </div>
              <div class="card-hint">Tekan card untuk lihat detail progress point anda.</div>
            </div>
        
      </section>
    </main>
  </body>
</html>
